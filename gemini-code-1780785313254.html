<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Family World Cup Sweepstake</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-color: #151f32;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --accent-orange: #f97316;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #1e293b;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            background: linear-gradient(to right, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .update-badge {
            display: inline-block;
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.85rem;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 0.75rem;
            font-weight: 500;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1100px) {
            .container { grid-template-columns: 1.2fr 2fr; }
        }

        .card {
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.35rem;
            border-left: 4px solid var(--accent-blue);
            padding-left: 0.5rem;
            margin-bottom: 1.25rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 0.6rem 0.5rem;
            border-bottom: 2px solid var(--border-color);
            text-align: left;
        }

        td {
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .text-center { text-align: center; }
        .text-right { text-align: right; }

        .teams-badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            max-width: 320px;
        }

        .team-badge {
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #cbd5e1;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            white-space: nowrap;
        }

        .prizes-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }
        @media (min-width: 500px) {
            .prizes-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .prize-item {
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }

        .prize-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: bold;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        .prize-winner {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-main);
        }

        .prize-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .group-card {
            background: #1e293b;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
        }

        .group-card h3 {
            margin: 0 0 0.75rem 0;
            font-size: 1.1rem;
            color: #e2e8f0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.25rem;
        }

        .owner-lbl {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: normal;
            margin-left: 0.35rem;
            display: inline-block;
        }
    </style>
</head>

        function cleanTeamName(name) {
            if (!name) return "";
            let trimmed = name.trim();
            if (trimmed === "Bosnia & Herz") return "Bosnia & Herz.";
            return trimmed;

        // --- 2. ADVANCED CALCULATION MATRIX ---
        function calculateTournament() {
            let memberPoints = {};
            let groupStandings = {};
            let masterTeamsStats = {};

            Object.values(familyAllocations).forEach(name => { memberPoints[name] = 0; });
            Object.keys(familyAllocations).forEach(tName => {
                masterTeamsStats[tName] = { name: tName, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 };
            });

            rawMatches.forEach(m => {
                let hClean = cleanTeamName(m.home);
                let aClean = cleanTeamName(m.away);
                if (m.stage === "Group Stage") {
                    if (!groupStandings[m.group]) groupStandings[m.group] = {};
                    [hClean, aClean].forEach(t => {
                        if (!groupStandings[m.group][t]) groupStandings[m.group][t] = masterTeamsStats[t];
                    });
                }
            });

            // Fun Prize Track Flags
            let maxSingleGameGoals = 0;
            let goalAvalancheTeam = "None yet";
            let goalAvalancheOwner = "";

            let biggestRankDiff = -999;
            let giantKillerWinner = "None yet";
            let giantKillerDesc = "No major upsets recorded";

            rawMatches.forEach(m => {
                let hClean = cleanTeamName(m.home);
                let aClean = cleanTeamName(m.away);

                if (m.hScore !== null && m.aScore !== null) {
                    let ownerHome = familyAllocations[hClean] || "Unassigned";
                    let ownerAway = familyAllocations[aClean] || "Unassigned";

                    // Match Win/Draw Leaderboard Accumulator
                    if (m.hScore > m.aScore) {
                        if (familyAllocations[hClean]) memberPoints[familyAllocations[hClean]] += 3;
                    } else if (m.aScore > m.hScore) {
                        if (familyAllocations[aClean]) memberPoints[familyAllocations[aClean]] += 3;
                    } else {
                        if (familyAllocations[hClean]) memberPoints[familyAllocations[hClean]] += 1;
                        if (familyAllocations[aClean]) memberPoints[familyAllocations[aClean]] += 1;
                    }

                    // Stats engine for group records
                    let hStats = masterTeamsStats[hClean];
                    let aStats = masterTeamsStats[aClean];
                    if (hStats && aStats) {
                        hStats.p += 1; aStats.p += 1;
                        hStats.gf += m.hScore; aStats.gf += m.aScore;
                        hStats.ga += m.aScore; aStats.ga += m.hScore;

                        if (m.hScore > m.aScore) {
                            hStats.w += 1; hStats.pts += 3; aStats.l += 1;
                        } else if (m.aScore > m.hScore) {
                            aStats.w += 1; aStats.pts += 3; hStats.l += 1;
                        } else {
                            hStats.d += 1; hStats.pts += 1; aStats.d += 1; aStats.pts += 1;
                        }
                        hStats.gd = hStats.gf - hStats.ga;
                        aStats.gd = aStats.gf - aStats.ga;
                    }

                    // Prize Metric 1: Goal Avalanche
                    if (m.hScore > maxSingleGameGoals) {
                        maxSingleGameGoals = m.hScore;
                        goalAvalancheTeam = hClean;
                        goalAvalancheOwner = ownerHome;
                    }
                    if (m.aScore > maxSingleGameGoals) {
                        maxSingleGameGoals = m.aScore;
                        goalAvalancheTeam = aClean;
                        goalAvalancheOwner = ownerAway;
                    }

                    // Prize Metric 2: Giant Killer (Rank difference logic)
                    let hRank = teamRankings[hClean] || 48;
                    let aRank = teamRankings[aClean] || 48;

                    if (m.hScore > m.aScore) {
                        let diff = hRank - aRank; // Underdog has larger number rank
                        if (diff > biggestRankDiff && diff > 0) {
                            biggestRankDiff = diff;
                            giantKillerWinner = hClean;
                            giantKillerDesc = `Beat ${aClean} (Rank Upset: +${diff})`;
                        }
                    } else if (m.aScore > m.hScore) {
                        let diff = aRank - hRank;
                        if (diff > biggestRankDiff && diff > 0) {
                            biggestRankDiff = diff;
                            giantKillerWinner = aClean;
                            giantKillerDesc = `Beat ${hClean} (Rank Upset: +${diff})`;
                        }
                    }
                }
            });

            // Prize Metric 3: Wooden Spoon (Sort order: points ASC -> GD ASC -> Goals Scored ASC)
            let finalTeamsArray = Object.values(masterTeamsStats).filter(t => t.p > 0);
            let worstTeam = null;
            if (finalTeamsArray.length > 0) {
                finalTeamsArray.sort((a, b) => a.pts - b.pts || a.gd - b.gd || a.gf - b.gf);
                worstTeam = finalTeamsArray[0];
            }

            renderUI(groupStandings, memberPoints, worstTeam, giantKillerWinner, giantKillerDesc, goalAvalancheTeam, goalAvalancheOwner, maxSingleGameGoals);
        }

        // --- 3. DYNAMIC INTERFACE RENDERER ---
        function renderUI(groupStandings, memberPoints, worstTeam, gkWinner, gkDesc, gaTeam, gaOwner, gaGoals) {
            // Precise Live Date Update Stamp
            const now = new Date();
            document.getElementById('lastUpdatedTime').innerText = now.toLocaleDateString('en-GB', {
                day: '2-digit', month: 'short', year: 'numeric'
            }) + ' at ' + now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

            // Display leaderboards
            const lbBody = document.getElementById('leaderboardBody');
            lbBody.innerHTML = '';
            let sortedLeaderboard = Object.entries(memberPoints).sort((a, b) => b[1] - a[1]);
            sortedLeaderboard.forEach(([name, pts], index) => {
                let badgesHtml = (personToTeamsMap[name] || []).map(t => `<span class="team-badge">${t}</span>`).join('');
                lbBody.innerHTML += `
                    <tr>
                        <td><strong style="color:var(--accent-green)">#${index + 1}</strong></td>
                        <td>
                            <div style="font-weight: bold; margin-bottom: 0.35rem; font-size: 1.05rem;">${name}</div>
                            <div class="teams-badge-container">${badgesHtml}</div>
                        </td>
                        <td class="text-right"><strong style="color:var(--accent-blue); font-size: 1.1rem;">${pts} Pts</strong></td>
                    </tr>
                `;
            });

            // Display Awards
            if (worstTeam) {
                let spoonOwner = familyAllocations[worstTeam.name] || "Unassigned";
                document.getElementById('woodenSpoonWinner').innerText = worstTeam.name;
                document.getElementById('woodenSpoonDesc').innerText = `${spoonOwner} (${worstTeam.pts} pts, ${worstTeam.gd} GD)`;
            }
            if (gkWinner !== "None yet") {
                let gkOwner = familyAllocations[gkWinner] || "Unassigned";
                document.getElementById('giantKillerWinner').innerText = gkWinner;
                document.getElementById('giantKillerDesc').innerText = `${gkOwner} • ${gkDesc}`;
            }
            if (gaGoals > 0) {
                document.getElementById('goalAvalancheWinner').innerText = gaTeam;
                document.getElementById('goalAvalancheDesc').innerText = `${gaOwner} • Scored ${gaGoals} in 1 game`;
            }

            // Display Group Tables Feed
            const groupsBox = document.getElementById('groupsContainer');
            groupsBox.innerHTML = '';
            Object.keys(groupStandings).sort().forEach(gName => {
                let groupTeams = Object.values(groupStandings[gName]);
                groupTeams.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);

                let rowsHtml = '';
                groupTeams.forEach(t => {
                    let owner = familyAllocations[t.name] || "Neutral";
                    rowsHtml += `
                        <tr>
                            <td><strong>${t.name}</strong><span class="owner-lbl">(${owner})</span></td>
                            <td class="text-center">${t.p}</td>
                            <td class="text-center">${t.gd > 0 ? '+' + t.gd : t.gd}</td>
                            <td class="text-center" style="font-weight:bold; color:var(--accent-green)">${t.pts}</td>
                        </tr>
                    `;
                });

                groupsBox.innerHTML += `
                    <div class="group-card">
                        <h3>${gName}</h3>
                        <table>
                            <thead>
                                <tr>
                                    <th>Team</th>
                                    <th class="text-center">P</th>
                                    <th class="text-center">GD</th>
                                    <th class="text-center">Pts</th>
                                </tr>
                            </thead>
                            <tbody>${rowsHtml}</tbody>
                        </table>
                    </div>
                `;
            });
        }

        window.addEventListener('DOMContentLoaded', calculateTournament);
    </script>
</body>
</html>
