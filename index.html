<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Family World Cup Sweepstake</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-color: #151f32;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #1e293b;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            background: linear-gradient(to right, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1100px) {
            .container { grid-template-columns: 1.2fr 2fr; }
        }

        .card {
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.35rem;
            border-left: 4px solid var(--accent-blue);
            padding-left: 0.5rem;
            margin-bottom: 1.25rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 0.6rem 0.5rem;
            border-bottom: 2px solid var(--border-color);
            text-align: left;
        }

        td {
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .text-center { text-align: center; }
        .text-right { text-align: right; }

        .teams-badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            max-width: 320px;
        }

        .team-badge {
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #cbd5e1;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            white-space: nowrap;
        }

        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .group-card {
            background: #1e293b;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
        }

        .group-card h3 {
            margin: 0 0 0.75rem 0;
            font-size: 1.1rem;
            color: #e2e8f0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.25rem;
        }

        .owner-lbl {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: normal;
            margin-left: 0.35rem;
            display: inline-block;
        }
        
        .neutral-lbl {
            color: #64748b;
            font-style: italic;
        }
    </style>
</head>

        // --- Helper function to handle potential typo matches between sheets
        function cleanTeamName(name) {
            if (!name) return "";
            let trimmed = name.trim();
            if (trimmed === "Bosnia & Herz") return "Bosnia & Herz.";
            return trimmed;
        }

        // --- 2. CALCULATIONS ENGINE ---
        function calculateTournament() {
            let memberPoints = {};
            let groupStandings = {};

            // Initialize point records
            Object.values(familyAllocations).forEach(name => {
                memberPoints[name] = 0;
            });

            // Set up blank group lists dynamically
            rawMatches.forEach(m => {
                let hClean = cleanTeamName(m.home);
                let aClean = cleanTeamName(m.away);

                if (m.stage === "Group Stage") {
                    if (!groupStandings[m.group]) groupStandings[m.group] = {};
                    [hClean, aClean].forEach(t => {
                        if (!groupStandings[m.group][t]) {
                            groupStandings[m.group][t] = { name: t, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 };
                        }
                    });
                }
            });

            // Iterate across games to calculate goals and points arrays
            rawMatches.forEach(m => {
                let hClean = cleanTeamName(m.home);
                let aClean = cleanTeamName(m.away);

                if (m.hScore !== null && m.aScore !== null) {
                    let ownerHome = familyAllocations[hClean];
                    let ownerAway = familyAllocations[aClean];

                    // Process Leaderboard Point Additions
                    if (m.hScore > m.aScore) {
                        if (ownerHome) memberPoints[ownerHome] += 3;
                    } else if (m.aScore > m.hScore) {
                        if (ownerAway) memberPoints[ownerAway] += 3;
                    } else {
                        if (ownerHome) memberPoints[ownerHome] += 1;
                        if (ownerAway) memberPoints[ownerAway] += 1;
                    }

                    // Process Group Stage Calculation
                    if (m.stage === "Group Stage") {
                        let hStats = groupStandings[m.group][hClean];
                        let aStats = groupStandings[m.group][aClean];

                        if (hStats && aStats) {
                            hStats.p += 1; aStats.p += 1;
                            hStats.gf += m.hScore; aStats.gf += m.aScore;
                            hStats.ga += m.aScore; aStats.ga += m.hScore;

                            if (m.hScore > m.aScore) {
                                hStats.w += 1; hStats.pts += 3;
                                aStats.l += 1;
                            } else if (m.aScore > m.hScore) {
                                aStats.w += 1; aStats.pts += 3;
                                hStats.l += 1;
                            } else {
                                hStats.d += 1; hStats.pts += 1;
                                aStats.d += 1; aStats.pts += 1;
                            }
                            hStats.gd = hStats.gf - hStats.ga;
                            aStats.gd = aStats.gf - aStats.ga;
                        }
                    }
                }
            });

            renderUI(groupStandings, memberPoints);
        }

        // --- 3. UI GENERATOR ---
        function renderUI(groupStandings, memberPoints) {
            // Populate Standings Leaderboard with Team Lists
            const lbBody = document.getElementById('leaderboardBody');
            lbBody.innerHTML = '';
            let sortedLeaderboard = Object.entries(memberPoints).sort((a, b) => b[1] - a[1]);
            
            sortedLeaderboard.forEach(([name, pts], index) => {
                let teamsList = personToTeamsMap[name] || [];
                let badgesHtml = teamsList.map(t => `<span class="team-badge">${t}</span>`).join('');

                lbBody.innerHTML += `
                    <tr>
                        <td><strong style="color:var(--accent-green)">#${index + 1}</strong></td>
                        <td>
                            <div style="font-weight: bold; margin-bottom: 0.35rem; font-size: 1.05rem;">${name}</div>
                            <div class="teams-badge-container">${badgesHtml}</div>
                        </td>
                        <td class="text-right"><strong style="color:var(--accent-blue); font-size: 1.1rem;">${pts} Pts</strong></td>
                    </tr>
                `;
            });

            // Populate Group Tables Feed Grid
            const groupsBox = document.getElementById('groupsContainer');
            groupsBox.innerHTML = '';
            let sortedGroups = Object.keys(groupStandings).sort();

            sortedGroups.forEach(gName => {
                let groupTeams = Object.values(groupStandings[gName]);
                groupTeams.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);

                let tableRowsHtml = '';
                groupTeams.forEach(t => {
                    let owner = familyAllocations[t.name];
                    let ownerText = owner ? `(${owner})` : `<span class="neutral-lbl">(🌍 Neutral)</span>`;
                    tableRowsHtml += `
                        <tr>
                            <td><strong>${t.name}</strong><span class="owner-lbl">${ownerText}</span></td>
                            <td class="text-center">${t.p}</td>
                            <td class="text-center">${t.gd > 0 ? '+' + t.gd : t.gd}</td>
                            <td class="text-center" style="font-weight:bold; color:var(--accent-green)">${t.pts}</td>
                        </tr>
                    `;
                });

                groupsBox.innerHTML += `
                    <div class="group-card">
                        <h3>${gName}</h3>
                        <table>
                            <thead>
                                <tr>
                                    <th>Team</th>
                                    <th class="text-center">P</th>
                                    <th class="text-center">GD</th>
                                    <th class="text-center">Pts</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRowsHtml}
                            </tbody>
                        </table>
                    </div>
                `;
            });
        }

        window.addEventListener('DOMContentLoaded', calculateTournament);
    </script>

</html>
